{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Department - ExamMatrix</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #090d16;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --accent-cyan: #06b6d4;
            --accent-blue: #3b82f6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            padding-bottom: 60px;
            position: relative;
            overflow-x: hidden;
        }

        .ambient-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.3;
            pointer-events: none;
        }
        .blob-1 { width: 500px; height: 500px; background: var(--accent-cyan); top: -100px; left: -100px; }

        .navbar-glass {
            background: rgba(9, 13, 22, 0.75);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass);
        }
        .navbar-brand-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #fff;
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-control, input[type="text"] {
            background-color: #0f172a !important;
            border: 1px solid var(--border-glass) !important;
            color: #f8fafc !important;
            border-radius: 12px !important;
            padding: 12px 16px !important;
        }
    </style>
</head>
<body>

    <div class="ambient-blob blob-1"></div>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top navbar-glass py-3 mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-3" href="{% url 'exam:manage_departments' %}">
                <div class="navbar-brand-logo">
                    <i class="bi bi-pencil-square"></i>
                </div>
                <div>
                    <div class="fw-bold fs-5 text-white">Edit Department</div>
                    <div class="text-muted" style="font-size: 0.72rem; margin-top: -3px;">Modify Academic Department Name</div>
                </div>
            </a>

            <div class="ms-auto">
                <a href="{% url 'exam:manage_departments' %}" class="btn btn-sm btn-outline-light rounded-pill px-3">
                    <i class="bi bi-arrow-left me-1"></i> Back to Departments
                </a>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div class="glass-card p-4 p-md-5">
            <h4 class="fw-bold text-white mb-4 text-center">Edit Department: {{ department.name }}</h4>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="{{ form.name.id_for_label }}" class="form-label text-white fw-semibold">Department Name:</label>
                    {{ form.name }}
                </div>
                
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-primary rounded-pill w-100 py-3 fw-bold" style="background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue)); border: none;">Save Changes</button>
                    <a href="{% url 'exam:manage_departments' %}" class="btn btn-outline-secondary rounded-pill w-100 py-3 fw-bold">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
